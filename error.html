<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Sklep Lamp</title>
<link rel="stylesheet" href="style.css">
</head>

<body data-page="error" class="error-page-body">

<main class="container error-shell">
<section class="error-card reveal-on-scroll">
<div class="error-media">
<img src="images/error.png" data-i18n-alt="error.imageAlt" alt="">
</div>

<div class="error-copy">
<p class="hero-kicker" data-i18n="error.heroKicker">Nie znaleziono strony</p>
<h2 class="error-code">404</h2>
<h3 class="error-title" data-i18n="error.title">Ta strona pekla jak zarowka</h3>
<p class="error-text" data-i18n="error.text">Adres, ktory otwarto, nie istnieje albo zostal przeniesiony. Skorzystaj z przyciskow ponizej, aby wrocic do katalogu, otworzyc biblioteke lub przejsc do logowania.</p>

<div class="error-actions">
<button class="product-action" type="button" onclick="goToPage('index.html')" data-i18n="common.backToCatalog">Powrot do katalogu</button>
<button class="product-action secondary" type="button" onclick="goToPage('library.html')" data-i18n="error.openLibrary">Otworz biblioteke</button>
<button class="product-action secondary" type="button" onclick="goToPage('login.html')" data-i18n="error.openLogin">Otworz logowanie</button>
</div>
</div>
</section>
</main>

<script src="i18n.js"></script>
<script src="storage.js"></script>
<script src="ui.js"></script>
<script src="products.js"></script>
<script src="search.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
