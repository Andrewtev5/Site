<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logowanie | Sklep Lamp</title>
<link rel="stylesheet" href="style.css">
</head>

<body data-page="login">

<main class="container page-shell">
<section class="page-card auth-page-card reveal-on-scroll">
<div class="page-heading">
<p class="hero-kicker" data-i18n="login.heroKicker">Bezpieczny dostep</p>
<h2 class="title" data-i18n="login.title">Logowanie</h2>
<p class="hero-text" data-i18n="login.text">Zaloguj sie do profilu, aby zapisywac lampy, otwierac biblioteke i wykonywac zakupy demonstracyjne do pracy dyplomowej.</p>
</div>

<div class="auth-tabs">
<button class="auth-tab active" type="button" data-i18n="login.tabLogin">Zaloguj sie</button>
<button class="auth-tab" type="button" onclick="goToPage('register.html')" data-i18n="login.tabRegister">Zaloz konto</button>
</div>

<form class="auth-panel active standalone-form" id="loginPanel" novalidate>
<label class="field">
<span data-i18n="common.email">Email</span>
<input id="loginEmail" name="email" type="email" autocomplete="email" data-i18n-placeholder="login.emailPlaceholder" placeholder="name@example.com" required>
</label>

<label class="field">
<span data-i18n="common.password">Haslo</span>
<input id="loginPassword" name="password" type="password" autocomplete="current-password" data-i18n-placeholder="login.passwordPlaceholder" placeholder="Wpisz haslo" required>
</label>

<button class="form-submit" id="loginSubmit" type="submit" data-i18n="login.submit">Zaloguj sie</button>
</form>

<p class="security-note" data-i18n="login.securityNote">To lokalne demo logowania z haszowaniem hasel po stronie przegladarki. Do pelnej wersji produkcyjnej mozna pozniej dodac backend.</p>

<div class="page-link-row">
<button class="product-action secondary" type="button" onclick="goToPage('index.html')" data-i18n="common.backToCatalog">Powrot do katalogu</button>
<button class="product-action" type="button" onclick="goToPage('register.html')" data-i18n="login.needAccount">Potrzebujesz konta?</button>
</div>
</section>
</main>

<script src="i18n.js"></script>
<script src="script.js"></script>

</body>
</html>
